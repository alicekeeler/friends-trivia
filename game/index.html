<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friends Trivia - Player Pad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .purple-door { background-color: #2D0A3E; }
    .friends-dot-red { color: #E11D48; }
    .friends-dot-blue { color: #2563EB; }
    .friends-dot-yellow { color: #F59E0B; }
  </style>
</head>
<body class="purple-door text-white min-h-screen flex flex-col justify-between p-4 font-sans">

  <!-- HEADER -->
  <header class="text-center my-4">
    <h1 class="text-3xl font-black tracking-widest text-white flex items-center justify-center space-x-1 font-mono uppercase">
      <span>O</span><span class="friends-dot-red">•</span>
      <span>R</span><span class="friends-dot-blue">•</span>
      <span>I</span><span class="friends-dot-yellow">•</span>
      <span>O</span><span class="friends-dot-red">•</span>
      <span>N</span>
    </h1>
    <p class="text-yellow-400 text-sm font-bold italic mt-1">Player Pad ☕</p>
  </header>

  <main class="w-full max-w-md mx-auto my-auto space-y-6">

    <!-- TEAM NAME INPUT -->
    <div class="bg-purple-900/90 p-5 rounded-2xl border-2 border-yellow-400 shadow-xl text-center">
      <label for="team-name" class="block text-yellow-300 font-bold mb-2 uppercase text-sm tracking-wider">
        Enter Team / Player Name:
      </label>
      <input 
        type="text" 
        id="team-name" 
        placeholder="e.g. The Chan-Chan Mans" 
        class="w-full p-3 rounded-xl bg-purple-950 border border-yellow-400 text-white font-bold text-center text-lg focus:outline-none focus:ring-2 focus:ring-yellow-300"
      />
    </div>

    <!-- ANSWER BUTTONS -->
    <div class="bg-purple-900/90 p-5 rounded-2xl border-2 border-yellow-400 shadow-xl">
      <p class="text-center text-purple-200 text-sm font-semibold mb-4">Select your answer for the active question:</p>

      <div class="grid grid-cols-2 gap-4">
        <button onclick="submitAnswer(0)" class="opt-btn bg-purple-950 hover:bg-yellow-500 hover:text-purple-950 text-yellow-400 border-2 border-yellow-400 font-black text-3xl py-6 rounded-2xl transition-all active:scale-95 cursor-pointer">
          A
        </button>
        <button onclick="submitAnswer(1)" class="opt-btn bg-purple-950 hover:bg-yellow-500 hover:text-purple-950 text-yellow-400 border-2 border-yellow-400 font-black text-3xl py-6 rounded-2xl transition-all active:scale-95 cursor-pointer">
          B
        </button>
        <button onclick="submitAnswer(2)" class="opt-btn bg-purple-950 hover:bg-yellow-500 hover:text-purple-950 text-yellow-400 border-2 border-yellow-400 font-black text-3xl py-6 rounded-2xl transition-all active:scale-95 cursor-pointer">
          C
        </button>
        <button onclick="submitAnswer(3)" class="opt-btn bg-purple-950 hover:bg-yellow-500 hover:text-purple-950 text-yellow-400 border-2 border-yellow-400 font-black text-3xl py-6 rounded-2xl transition-all active:scale-95 cursor-pointer">
          D
        </button>
      </div>
    </div>

    <!-- STATUS MESSAGE -->
    <div id="status-msg" class="text-center font-bold text-lg min-h-[30px] text-yellow-300"></div>

  </main>

  <footer class="text-center text-xs text-purple-300 my-2">
    Orion Handbook Trivia • Powered by Central Perk
  </footer>

  <script>
    const SCRIPT_URL = "https://script.google.com/a/macros/orioneducation.org/s/AKfycbxZPWY8Tjkc5vkik0sVLLciZHw5VMrkUoTb2APTwOZk7IZRzPkSVSkN0WLlFzXaOSoI/exec";

    async function submitAnswer(index) {
      const teamName = document.getElementById('team-name').value.trim();
      const statusMsg = document.getElementById('status-msg');

      if (!teamName) {
        alert("Please enter a Team Name first!");
        return;
      }

      const options = ['A', 'B', 'C', 'D'];
      const chosenOption = options[index];

      statusMsg.className = "text-center font-bold text-lg text-yellow-400 animate-pulse";
      statusMsg.innerText = `Submitting choice ${chosenOption}...`;

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'submitVote',
            team: teamName,
            round: window.currentActiveRound || 1,
            answer: index
          })
        });

        statusMsg.className = "text-center font-bold text-lg text-green-400";
        statusMsg.innerText = `✅ Locked in choice ${chosenOption} for team "${teamName}"!`;
      } catch (err) {
        console.error(err);
        statusMsg.className = "text-center font-bold text-lg text-red-400";
        statusMsg.innerText = "❌ Failed to submit answer. Try again.";
      }
    }
  </script>
</body>
</html>
