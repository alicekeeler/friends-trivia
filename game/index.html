<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friends Trivia - Player</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .purple-door { background-color: #2D0A3E; }
    .friends-dot-red { color: #E11D48; }
    .friends-dot-blue { color: #2563EB; }
    .friends-dot-yellow { color: #F59E0B; }
  </style>
</head>
<body class="purple-door text-white min-h-screen flex flex-col justify-between p-4 font-sans select-none">

  <!-- HEADER -->
  <header class="text-center my-3">
    <h1 class="text-3xl font-black tracking-widest text-white flex items-center justify-center space-x-1 font-mono uppercase">
      <span>O</span><span class="friends-dot-red">•</span>
      <span>R</span><span class="friends-dot-blue">•</span>
      <span>I</span><span class="friends-dot-yellow">•</span>
      <span>O</span><span class="friends-dot-red">•</span>
      <span>N</span>
    </h1>
    <p class="text-yellow-400 italic text-xs font-bold mt-1">Player Response Screen</p>
  </header>

  <main class="max-w-md w-full mx-auto my-auto space-y-4">

    <!-- TEAM NAME INPUT (IF NOT SET) -->
    <div id="team-name-card" class="bg-purple-900 border-4 border-yellow-400 rounded-3xl p-6 shadow-2xl space-y-4">
      <h2 class="text-lg font-black text-center text-yellow-300 uppercase tracking-wider">
        Enter Your Team Name
      </h2>
      <input id="team-input" type="text" placeholder="e.g. The Chan-Chan Mans" class="w-full p-3 rounded-xl bg-purple-950 border-2 border-yellow-400 text-white font-bold placeholder-purple-400 text-center focus:outline-none focus:ring-2 focus:ring-yellow-300"/>
      <button onclick="saveTeamName()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-purple-950 font-black py-3 rounded-xl transition-all shadow-lg active:scale-95">
        Join Game 🚀
      </button>
    </div>

    <!-- MAIN GAME CARD (HIDDEN UNTIL TEAM NAME SET) -->
    <div id="game-card" class="bg-purple-900 border-4 border-yellow-400 rounded-3xl p-5 shadow-2xl space-y-4 hidden">
      
      <!-- TEAM BADGE -->
      <div class="flex items-center justify-between border-b border-yellow-400/30 pb-2">
        <span id="team-display-name" class="font-black text-yellow-300 text-sm"></span>
        <button onclick="changeTeam()" class="text-xs text-purple-300 underline">Change</button>
      </div>

      <!-- ROUND BADGE -->
      <div class="text-center">
        <span id="player-round-badge" class="bg-yellow-400 text-purple-950 font-black text-xs uppercase px-3 py-1 rounded-full">
          Waiting for Round...
        </span>
      </div>

      <!-- QUESTION TEXT -->
      <h3 id="player-question-text" class="text-base sm:text-lg font-bold text-center text-white leading-snug min-h-[50px] flex items-center justify-center">
        Waiting for the host to start the round...
      </h3>

      <!-- ANSWER BUTTONS GRID -->
      <div id="options-grid" class="grid grid-cols-1 gap-2">
        <button onclick="submitVote(0)" id="btn-0" class="vote-btn bg-purple-950 border-2 border-yellow-400/60 p-3 rounded-xl text-left font-bold text-sm flex items-center gap-3 active:scale-95 transition-all">
          <span class="bg-yellow-400 text-purple-950 font-black px-2.5 py-0.5 rounded">A</span>
          <span id="opt-0-label">Option A</span>
        </button>

        <button onclick="submitVote(1)" id="btn-1" class="vote-btn bg-purple-950 border-2 border-yellow-400/60 p-3 rounded-xl text-left font-bold text-sm flex items-center gap-3 active:scale-95 transition-all">
          <span class="bg-yellow-400 text-purple-950 font-black px-2.5 py-0.5 rounded">B</span>
          <span id="opt-1-label">Option B</span>
        </button>

        <button onclick="submitVote(2)" id="btn-2" class="vote-btn bg-purple-950 border-2 border-yellow-400/60 p-3 rounded-xl text-left font-bold text-sm flex items-center gap-3 active:scale-95 transition-all">
          <span class="bg-yellow-400 text-purple-950 font-black px-2.5 py-0.5 rounded">C</span>
          <span id="opt-2-label">Option C</span>
        </button>

        <button onclick="submitVote(3)" id="btn-3" class="vote-btn bg-purple-950 border-2 border-yellow-400/60 p-3 rounded-xl text-left font-bold text-sm flex items-center gap-3 active:scale-95 transition-all">
          <span class="bg-yellow-400 text-purple-950 font-black px-2.5 py-0.5 rounded">D</span>
          <span id="opt-3-label">Option D</span>
        </button>
      </div>

      <!-- VOTE STATUS MESSAGE -->
      <div id="vote-status" class="text-center text-xs font-bold text-yellow-300 min-h-[20px]"></div>

    </div>

  </main>

  <footer class="text-center text-xs text-purple-300 my-2">
    Friends Trivia System • Real-Time Sync Active
  </footer>

  <script>
    const SCRIPT_URL = "https://script.google.com/a/macros/orioneducation.org/s/AKfycbE6je5WshCmMRJ9UTniRhlKM24fAsbqKvCNNEeN2d7b1jYtOdV3UWlirLA_FWyN4c0/exec";

    let teamName = localStorage.getItem("friends_trivia_team") || "";
    let currentActiveQ = null;
    let submittedVote = null;

    if (teamName) showGameCard();

    function saveTeamName() {
      const val = document.getElementById("team-input").value.trim();
      if (!val) return alert("Please enter a team name!");
      teamName = val;
      localStorage.setItem("friends_trivia_team", teamName);
      showGameCard();
    }

    function changeTeam() {
      localStorage.removeItem("friends_trivia_team");
      document.getElementById("team-name-card").classList.remove("hidden");
      document.getElementById("game-card").classList.add("hidden");
    }

    function showGameCard() {
      document.getElementById("team-name-card").classList.add("hidden");
      document.getElementById("game-card").classList.remove("hidden");
      document.getElementById("team-display-name").innerText = `Team: ${teamName}`;
      startPollingQuestion();
    }

    // POLL GOOGLE APPS SCRIPT EVERY 2 SECONDS FOR CURRENT QUESTION
    function startPollingQuestion() {
      fetchQuestion();
      setInterval(fetchQuestion, 2000);
    }

    async function fetchQuestion() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=getActiveQuestion`);
        const data = await response.json();

        if (data && data.question) {
          // If a new question loaded, clear previous selection state
          if (!currentActiveQ || currentActiveQ.id !== data.id) {
            currentActiveQ = data;
            submittedVote = null;
            resetOptionStyles();
            document.getElementById("vote-status").innerText = "";
          }

          document.getElementById("player-round-badge").innerText = `ROUND ${data.number}`;
          document.getElementById("player-question-text").innerText = data.question;

          for (let i = 0; i < 4; i++) {
            document.getElementById(`opt-${i}-label`).innerText = data.options[i] || `Option ${i+1}`;
          }
        }
      } catch (err) {
        console.log("Polling active question...", err);
      }
    }

    // SUBMIT VOTE TO GOOGLE SHEET
    async function submitVote(optionIndex) {
      if (!currentActiveQ) return alert("Wait for the host to display a question!");

      submittedVote = optionIndex;
      highlightSelectedOption(optionIndex);
      document.getElementById("vote-status").innerText = "⏳ Recording vote in spreadsheet...";

      try {
        const url = `${SCRIPT_URL}?action=submitVote&team=${encodeURIComponent(teamName)}&round=${currentActiveQ.number}&vote=${optionIndex}`;
        await fetch(url, { mode: 'no-cors' });

        document.getElementById("vote-status").innerText = "✅ Answer Locked In!";
      } catch (err) {
        document.getElementById("vote-status").innerText = "❌ Connection error, tap to retry.";
      }
    }

    function highlightSelectedOption(selectedIndex) {
      for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`btn-${i}`);
        if (i === selectedIndex) {
          btn.className = "vote-btn bg-green-700 border-4 border-green-300 p-3 rounded-xl text-left font-bold text-sm flex items-center gap-3 text-white scale-102";
        } else {
          btn.className = "vote-btn bg-purple-950 border-2 border-yellow-400/30 p-3 rounded-xl text-left font-bold text-sm flex items-center gap-3 opacity-50";
        }
      }
    }

    function resetOptionStyles() {
      for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`btn-${i}`);
        btn.className = "vote-btn bg-purple-950 border-2 border-yellow-400/60 p-3 rounded-xl text-left font-bold text-sm flex items-center gap-3 active:scale-95 transition-all";
      }
    }
  </script>
</body>
</html>
