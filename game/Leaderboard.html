<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O·R·I·O·N - Live Leaderboard</title>
  <style>
    :root {
      --bg-color: #1a0826;
      --card-bg: #2b113e;
      --border-gold: #ffd000;
      --text-white: #ffffff;
      --dot-red: #ff2a2a;
      --dot-blue: #00a2ff;
      --dot-yellow: #ffd000;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-white);
      margin: 0;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* 🔴🔵🟡 LOGO HEADER */
    .friends-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .friends-title {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 6px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      margin: 0 4px;
    }
    .dot-red { background-color: var(--dot-red); box-shadow: 0 0 8px var(--dot-red); }
    .dot-blue { background-color: var(--dot-blue); box-shadow: 0 0 8px var(--dot-blue); }
    .dot-yellow { background-color: var(--dot-yellow); box-shadow: 0 0 8px var(--dot-yellow); }

    .subtitle {
      font-style: italic;
      color: var(--border-gold);
      font-size: 1.3rem;
      margin-top: 6px;
      font-weight: bold;
    }

    .pill-badge {
      background-color: var(--border-gold);
      color: #000;
      font-weight: 900;
      padding: 8px 26px;
      border-radius: 20px;
      font-size: 1.1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 30px;
      box-shadow: 0 0 15px rgba(255, 208, 0, 0.3);
    }

    /* 🏆 LEADERBOARD CONTAINER */
    .board-container {
      width: 100%;
      max-width: 900px;
      background-color: var(--card-bg);
      border: 3px solid var(--border-gold);
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .leader-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.25);
      border: 2px solid rgba(255, 208, 0, 0.3);
      border-radius: 16px;
      padding: 16px 24px;
      margin-bottom: 12px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .leader-row:hover {
      border-color: var(--border-gold);
      transform: scale(1.01);
    }

    .rank-badge {
      font-size: 1.5rem;
      font-weight: 900;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: var(--border-gold);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 18px;
      flex-shrink: 0;
    }

    .leader-row:nth-child(1) .rank-badge { background: #ffd700; color: #000; box-shadow: 0 0 12px #ffd700; }
    .leader-row:nth-child(2) .rank-badge { background: #c0c0c0; color: #000; }
    .leader-row:nth-child(3) .rank-badge { background: #cd7f32; color: #fff; }

    .team-info {
      flex-grow: 1;
    }

    .team-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
    }

    .team-meta {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 2px;
    }

    .team-score {
      font-size: 2rem;
      font-weight: 900;
      color: var(--border-gold);
      text-align: right;
      min-width: 90px;
    }

    .score-label {
      font-size: 0.75rem;
      color: #ccc;
      text-transform: uppercase;
      display: block;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      font-size: 1.2rem;
      color: #aaa;
      font-style: italic;
    }

    .status-footer {
      margin-top: 25px;
      font-size: 0.85rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background-color: #2ec4b6;
      border-radius: 50%;
      box-shadow: 0 0 8px #2ec4b6;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="friends-header">
    <div class="friends-title">
      O<span class="dot dot-red"></span>R<span class="dot dot-blue"></span>I<span class="dot dot-yellow"></span>O<span class="dot dot-red"></span>N
    </div>
    <div class="subtitle">"The One With the Employee Handbook" ☕</div>
  </div>

  <div class="pill-badge">🏆 LIVE LEADERBOARD</div>

  <div class="board-container" id="leaderboard-list">
    <div class="empty-state">Loading scores...</div>
  </div>

  <div class="status-footer">
    <div class="live-dot"></div>
    <span id="sync-status">Auto-syncing scores live...</span>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQuBbsiQoY7xCM2K10yuVWF2j6NLUS2zI8D2r25HICcgRaLE3AbZn4AnVealewNpih/exec";

    async function fetchLeaderboard() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=leaderboard`);
        const data = await response.json();

        if (data.status === "success" && data.leaderboard) {
          renderLeaderboard(data.leaderboard);
          document.getElementById('sync-status').innerText = `Updated at ${new Date().toLocaleTimeString()}`;
        }
      } catch (err) {
        console.error("Leaderboard fetch error:", err);
        document.getElementById('sync-status').innerText = "⚠️ Connection issue, retrying...";
      }
    }

    function renderLeaderboard(teams) {
      const container = document.getElementById('leaderboard-list');

      if (!teams || teams.length === 0) {
        container.innerHTML = `<div class="empty-state">No submissions logged yet. Join and answer questions!</div>`;
        return;
      }

      container.innerHTML = teams.map((t, idx) => `
        <div class="leader-row">
          <div class="rank-badge">${idx + 1}</div>
          <div class="team-info">
            <div class="team-name">${escapeHtml(t.team)}</div>
            <div class="team-meta">${t.answered} question(s) submitted</div>
          </div>
          <div class="team-score">
            ${t.score}
            <span class="score-label">Points</span>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Auto refresh every 4 seconds
    fetchLeaderboard();
    setInterval(fetchLeaderboard, 4000);
  </script>
</body>
</html>
