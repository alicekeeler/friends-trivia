<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host TV Screen - Orion Friends Trivia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .purple-door { background-color: #3B0764; }
    .yellow-frame {
      border: 8px solid #FBBF24;
      box-shadow: 0 0 25px rgba(251, 191, 36, 0.6);
    }
  </style>
</head>
<body class="purple-door text-white min-h-screen flex flex-col justify-between p-8 font-sans">

  <!-- HEADER CONTROLS -->
  <header class="flex justify-between items-center border-b-4 border-yellow-400 pb-4">
    <div>
      <h1 class="text-4xl font-black text-yellow-300 tracking-wider">ORION HANDBOOK TRIVIA</h1>
      <p class="text-sm text-purple-200 uppercase tracking-widest mt-1">The One With The Policies • Host Screen</p>
    </div>
    <div class="flex items-center space-x-4">
      
      <!-- MANUAL THEME MUSIC BUTTON -->
      <button onclick="toggleTheme()" class="bg-purple-800 hover:bg-purple-700 text-yellow-300 border-2 border-yellow-400 font-bold px-4 py-3 rounded-xl text-sm shadow-md flex items-center space-x-2 transition-transform active:scale-95 cursor-pointer">
        <span id="theme-icon">🎵</span> <span id="theme-btn-text">PLAY THEME</span>
      </button>

      <!-- 30-SECOND TIMER -->
      <div id="timer" class="text-5xl font-black text-yellow-400 bg-purple-950 px-6 py-2 rounded-2xl border-4 border-yellow-400 shadow-lg min-w-[100px] text-center">30</div>
      
      <!-- NEXT QUESTION BUTTON -->
      <button onclick="nextQuestion()" class="bg-yellow-400 hover:bg-yellow-300 text-purple-950 font-black px-8 py-4 rounded-2xl text-xl shadow-xl transition-transform active:scale-95 cursor-pointer">
        NEXT QUESTION ➡️
      </button>
    </div>
  </header>

  <!-- MAIN QUESTION BOARD -->
  <main class="my-auto flex flex-col items-center w-full max-w-5xl mx-auto">
    <div id="category-badge" class="bg-yellow-400 text-purple-950 font-black text-lg px-8 py-2 rounded-full uppercase mb-6 shadow-md">
      Category: Welcome to Friends Trivia
    </div>

    <div class="yellow-frame bg-purple-900 p-8 rounded-3xl w-full text-center shadow-2xl">
      <h2 id="question-text" class="text-3xl font-bold text-white mb-8 min-h-[90px] flex items-center justify-center">
        Click "PLAY THEME" for music or "NEXT QUESTION" to begin! ☕
      </h2>

      <!-- 4 OPTIONS GRID -->
      <div class="grid grid-cols-2 gap-6 text-left">
        <div id="opt-box-0" class="bg-purple-950 p-5 rounded-xl border-2 border-yellow-500 text-lg font-semibold flex items-center">
          <span class="text-yellow-400 font-black text-2xl mr-3">A</span>
          <span id="h-opt-0" class="text-purple-100">Option A</span>
        </div>
        <div id="opt-box-1" class="bg-purple-950 p-5 rounded-xl border-2 border-yellow-500 text-lg font-semibold flex items-center">
          <span class="text-yellow-400 font-black text-2xl mr-3">B</span>
          <span id="h-opt-1" class="text-purple-100">Option B</span>
        </div>
        <div id="opt-box-2" class="bg-purple-950 p-5 rounded-xl border-2 border-yellow-500 text-lg font-semibold flex items-center">
          <span class="text-yellow-400 font-black text-2xl mr-3">C</span>
          <span id="h-opt-2" class="text-purple-100">Option C</span>
        </div>
        <div id="opt-box-3" class="bg-purple-950 p-5 rounded-xl border-2 border-yellow-500 text-lg font-semibold flex items-center">
          <span class="text-yellow-400 font-black text-2xl mr-3">D</span>
          <span id="h-opt-3" class="text-purple-100">Option D</span>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="flex justify-between items-center text-sm text-purple-300 border-t-2 border-purple-800 pt-4">
    <div class="flex items-center space-x-2">
      <span>📲 Players Scan & Join:</span>
      <span class="text-yellow-300 font-mono font-bold bg-purple-950 px-3 py-1 rounded-lg border border-yellow-400/30">
        alicekeeler.github.io/friends-trivia/game/
      </span>
    </div>
    <div id="audio-status" class="text-green-400 font-semibold flex items-center">
      <span class="mr-2">🔊</span> Sound Engine Active
    </div>
  </footer>

  <!-- SCRIPT LOGIC -->
  <script>
    // EXACT RELATIVE AUDIO PATHS (Stored in root repository directory)
    const SFX = {
      theme: new Audio('../short%20friends%20intro.mp3'),
      timerMusic: new Audio('../timer-music.mp3'), // Optional: Upload 30s timer music to root as timer-music.mp3
      join: new Audio('../hello-you.mp3'),
      tableSelect: new Audio('../how-you-doin.mp3'),
      question: new Audio('../i-got-a-question.mp3'),
      warning: new Audio('../how-the-hell-am-i-supposed-to-make-this-kind-of-decision.mp3'),
      timesUp: new Audio('../enough-already.mp3'),
      check: new Audio('../check.mp3'),
      reveal: new Audio('../bing.mp3'),
      correct: new Audio('../excellent.mp3'),
      wrong: new Audio('../don-t-blame-the-questions.mp3'),
      hardQuestion: new Audio('../have-you-lost-your-mind.mp3'),
      winner: new Audio('../i-know.mp3')
    };

    let bank = [];
    let currentRound = -1;
    let timerInterval = null;
    let isThemePlaying = false;

    // TOGGLE MANUAL THEME MUSIC
    function toggleTheme() {
      if (isThemePlaying) {
        SFX.theme.pause();
        SFX.theme.currentTime = 0;
        isThemePlaying = false;
        document.getElementById('theme-btn-text').innerText = 'PLAY THEME';
        document.getElementById('theme-icon').innerText = '🎵';
      } else {
        SFX.theme.currentTime = 0;
        SFX.theme.play().catch(e => console.log('Autoplay blocked:', e));
        isThemePlaying = true;
        document.getElementById('theme-btn-text').innerText = 'PAUSE THEME';
        document.getElementById('theme-icon').innerText = '⏸️';
      }
    }

    // Auto-reset theme button icon when track finishes naturally
    SFX.theme.onended = () => {
      isThemePlaying = false;
      document.getElementById('theme-btn-text').innerText = 'PLAY THEME';
      document.getElementById('theme-icon').innerText = '🎵';
    };

    // FETCH QUESTIONS FROM QUESTIONS.JSON
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('./questions.json');
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        bank = await response.json();
        console.log('Question bank loaded successfully:', bank);
      } catch (err) {
        console.error('Failed to load questions.json:', err);
        document.getElementById('question-text').innerText = '⚠️ Error loading questions.json! Make sure questions.json exists in /game/';
      }
    });

    function nextQuestion() {
      if (!bank || bank.length === 0) {
        alert('Questions are still loading or questions.json is missing!');
        return;
      }

      // Automatically stop theme music when moving to the next question
      if (isThemePlaying) toggleTheme();

      currentRound++;
      if (currentRound >= bank.length) {
        clearInterval(timerInterval);
        SFX.timerMusic.pause();
        document.getElementById('category-badge').innerText = 'GAME COMPLETED';
        document.getElementById('question-text').innerText = '🎉 Congratulations! You survived the Handbook Trivia!';
        SFX.winner.play().catch(() => {});
        return;
      }

      // Reset option box styling
      for (let i = 0; i < 4; i++) {
        const box = document.getElementById(`opt-box-${i}`);
        box.className = "bg-purple-950 p-5 rounded-xl border-2 border-yellow-500 text-lg font-semibold flex items-center";
      }

      // Select topic and pick a random question inside it
      const topic = bank[currentRound];
      const q = topic.questions[Math.floor(Math.random() * topic.questions.length)];

      // Update UI
      document.getElementById('category-badge').innerText = `Round ${currentRound + 1} of ${bank.length}: ${topic.category}`;
      document.getElementById('question-text').innerText = q.q;
      document.getElementById('h-opt-0').innerText = q.options[0];
      document.getElementById('h-opt-1').innerText = q.options[1];
      document.getElementById('h-opt-2').innerText = q.options[2];
      document.getElementById('h-opt-3').innerText = q.options[3];

      // Play Question Sound & Start Timer
      SFX.question.play().catch(() => {});
      startTimer();
    }

    function startTimer() {
      clearInterval(timerInterval);
      let timeLeft = 30;
      document.getElementById('timer').innerText = timeLeft;

      // Play background timer music if file exists
      SFX.timerMusic.currentTime = 0;
      SFX.timerMusic.play().catch(() => {});

      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;

        if (timeLeft === 10) {
          SFX.warning.play().catch(() => {});
        }
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          SFX.timerMusic.pause();
          SFX.timesUp.play().catch(() => {});
        }
      }, 1000);
    }
  </script>
</body>
</html>
