<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Friends Trivia - Host Control Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .purple-door { background-color: #2D0A3E; }
    .friends-dot-red { color: #E11D48; }
    .friends-dot-blue { color: #2563EB; }
    .friends-dot-yellow { color: #F59E0B; }
  </style>
</head>
<body class="purple-door text-white min-h-screen flex flex-col justify-between p-6 font-sans select-none">

  <!-- HARDCODED AUDIO ELEMENTS FOR INSTANT PLAYBACK -->
  <audio id="timer-audio" src="30secondfriendsintro.mp3" preload="auto"></audio>
  <audio id="timer-stop-audio" src="enough-already.mp3" preload="auto"></audio>
  <audio id="reveal-audio" src="claps.mp3" preload="auto"></audio>
  <audio id="next-q-audio" src="i-got-a-question.mp3" preload="auto"></audio>
  <audio id="leaderboard-audio" src="how-dumb-are-you.mp3" preload="auto"></audio>
  <audio id="restart-round-audio" src="how-come-you-re-working-here.mp3" preload="auto"></audio>
  <audio id="restart-game-audio" src="don-t-be-so-negative.mp3" preload="auto"></audio>

  <!-- FRIENDS-STYLE HEADER -->
  <header class="text-center my-2">
    <h1 class="text-4xl sm:text-5xl font-black tracking-widest text-white flex items-center justify-center space-x-1 font-mono uppercase">
      <span>O</span><span class="friends-dot-red">•</span>
      <span>R</span><span class="friends-dot-blue">•</span>
      <span>I</span><span class="friends-dot-yellow">•</span>
      <span>O</span><span class="friends-dot-red">•</span>
      <span>N</span>
    </h1>
    <p class="text-yellow-400 italic text-sm font-bold tracking-widest mt-1">"The One With the Employee Handbook" ☕</p>
  </header>

  <!-- TOP CONTROL BAR -->
  <div class="max-w-6xl w-full mx-auto bg-purple-950/80 p-3 rounded-2xl border-2 border-yellow-400 shadow-xl flex flex-wrap items-center justify-between gap-3">
    
    <!-- MANUAL BACKUP CONTROLLER -->
    <div class="flex items-center space-x-2">
      <span class="text-xs font-bold text-yellow-300 uppercase">☕ Friends Theme</span>
      <button onclick="playAudio('timer-audio')" class="bg-yellow-400 text-purple-950 font-black text-xs px-2 py-1 rounded-md">▶ Play</button>
      <button onclick="stopAllAudio()" class="bg-red-500 text-white font-black text-xs px-2 py-1 rounded-md">⏹ Stop All</button>
    </div>

    <!-- TIMER DISPLAY -->
    <div class="flex items-center space-x-2">
      <div id="timer-box" class="bg-purple-900 border-2 border-yellow-400 text-yellow-300 font-black text-2xl w-14 h-10 rounded-xl flex items-center justify-center shadow-inner">
        30
      </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="flex items-center gap-2 flex-wrap">
      
      <!-- RESTART GAME BUTTON -->
      <button onclick="restartGame()" class="bg-red-600 hover:bg-red-500 text-white font-black text-xs px-3 py-2 rounded-xl border border-red-300 shadow transition-all active:scale-95 flex items-center gap-1">
        ⏮️ Restart Game
      </button>

      <!-- RESTART ROUND BUTTON -->
      <button onclick="restartRound()" class="bg-yellow-500 hover:bg-yellow-400 text-purple-950 font-black text-xs px-3 py-2 rounded-xl border border-yellow-300 shadow transition-all active:scale-95 flex items-center gap-1">
        🔄 Restart Round
      </button>

      <!-- REVEAL ANSWER BUTTON -->
      <button onclick="revealAnswer()" class="bg-green-500 hover:bg-green-400 text-purple-950 font-black text-xs px-3 py-2 rounded-xl border border-green-300 shadow transition-all active:scale-95 flex items-center gap-1">
        💡 Reveal Answer
      </button>

      <!-- LEADERBOARD BUTTON -->
      <button onclick="openLeaderboard()" class="bg-blue-600 hover:bg-blue-500 text-white font-black text-xs px-3 py-2 rounded-xl border border-blue-300 shadow transition-all active:scale-95 flex items-center gap-1">
        🏆 Leaderboard
      </button>

      <!-- NEXT QUESTION BUTTON -->
      <button onclick="nextQuestion()" class="bg-yellow-400 hover:bg-yellow-300 text-purple-950 font-black text-xs px-4 py-2 rounded-xl border-2 border-yellow-200 shadow transition-all active:scale-95 flex items-center gap-1">
        Next Question ➡️
      </button>
    </div>
  </div>

  <!-- MAIN QUESTION DISPLAY -->
  <main class="max-w-4xl w-full mx-auto my-auto space-y-4">

    <!-- ROUND BADGE -->
    <div class="text-center">
      <span id="round-badge" class="bg-yellow-400 text-purple-950 font-black text-xs uppercase px-4 py-1.5 rounded-full border-2 border-yellow-200 tracking-wider shadow-md">
        WELCOME TO CENTRAL PERK ☕
      </span>
    </div>

    <!-- QUESTION CARD / WELCOME SCREEN -->
    <div class="bg-purple-900/90 border-4 border-yellow-400 rounded-3xl p-6 sm:p-8 shadow-2xl space-y-6">
      
      <div id="question-text">
        <!-- WELCOME DIRECTIONS RENDERED HERE BEFORE GAME STARTS -->
      </div>

      <!-- OPTIONS GRID (HIDDEN UNTIL GAME STARTS) -->
      <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
        
        <div id="option-card-0" class="option-card bg-purple-950 border-2 border-yellow-400/60 p-4 rounded-2xl flex items-center space-x-3 transition-all">
          <span class="bg-yellow-400 text-purple-950 font-black px-3 py-1 rounded-lg text-lg">A</span>
          <span id="opt-0-text" class="text-sm sm:text-base font-bold text-purple-100">Option A</span>
        </div>

        <div id="option-card-1" class="option-card bg-purple-950 border-2 border-yellow-400/60 p-4 rounded-2xl flex items-center space-x-3 transition-all">
          <span class="bg-yellow-400 text-purple-950 font-black px-3 py-1 rounded-lg text-lg">B</span>
          <span id="opt-1-text" class="text-sm sm:text-base font-bold text-purple-100">Option B</span>
        </div>

        <div id="option-card-2" class="option-card bg-purple-950 border-2 border-yellow-400/60 p-4 rounded-2xl flex items-center space-x-3 transition-all">
          <span class="bg-yellow-400 text-purple-950 font-black px-3 py-1 rounded-lg text-lg">C</span>
          <span id="opt-2-text" class="text-sm sm:text-base font-bold text-purple-100">Option C</span>
        </div>

        <div id="option-card-3" class="option-card bg-purple-950 border-2 border-yellow-400/60 p-4 rounded-2xl flex items-center space-x-3 transition-all">
          <span class="bg-yellow-400 text-purple-950 font-black px-3 py-1 rounded-lg text-lg">D</span>
          <span id="opt-3-text" class="text-sm sm:text-base font-bold text-purple-100">Option D</span>
        </div>

      </div>
    </div>

  </main>

  <!-- BOTTOM FOOTER -->
  <footer class="max-w-5xl w-full mx-auto flex flex-wrap items-center justify-between text-xs text-purple-300 gap-2">
    <div class="flex items-center space-x-2">
      <span class="bg-purple-950 px-3 py-1 rounded-lg border border-yellow-400/40 text-yellow-300 font-bold">
        📲 Players Join: <span class="text-white underline">alicekeeler.github.io/friends-trivia/game/</span>
      </span>
    </div>
    <div id="status-indicator" class="text-green-400 font-semibold flex items-center gap-1">
      <span>🔊</span> Central Perk Audio Engine Active
    </div>
  </footer>

  <!-- LEADERBOARD MODAL -->
  <div id="leaderboard-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
    <div class="bg-purple-950 border-4 border-yellow-400 w-full max-w-lg rounded-3xl p-6 shadow-2xl relative space-y-4">
      
      <div class="flex items-center justify-between border-b border-yellow-400/30 pb-3">
        <h3 class="text-2xl font-black text-yellow-400 uppercase tracking-wider flex items-center gap-2">
          🏆 Live Round Votes
        </h3>
        <button onclick="closeLeaderboard()" class="text-yellow-400 hover:text-white font-black text-xl px-2">✕</button>
      </div>

      <div id="leaderboard-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-1">
        <p class="text-center text-purple-300 italic py-4">Loading team scores...</p>
      </div>

      <button onclick="closeLeaderboard()" class="w-full bg-yellow-400 hover:bg-yellow-300 text-purple-950 font-black py-2.5 rounded-xl transition-all">
        Close Leaderboard
      </button>

    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/a/macros/orioneducation.org/s/AKfycbxf_7zgRk51eJcHgUwMsIsVwInZp3pfn04NdldD2zaqO-R4_G2lYzBKoVJ3LR-D4lj8/exec";

    // AUDIO PLAYBACK HELPERS
    function playAudio(elementId) {
      const audio = document.getElementById(elementId);
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.log(`Audio error for ${elementId}:`, e));
      }
    }

    function stopAudio(elementId) {
      const audio = document.getElementById(elementId);
      if (audio) {
        audio.pause();
        audio.currentTime = 0;
      }
    }

    function stopAllAudio() {
      const audioIds = [
        'timer-audio', 
        'timer-stop-audio', 
        'reveal-audio', 
        'next-q-audio', 
        'leaderboard-audio', 
        'restart-round-audio', 
        'restart-game-audio'
      ];
      audioIds.forEach(id => stopAudio(id));
    }

    // QUESTION POOL
    const topicPool = [
      {
        roundNumber: 1,
        badge: "ROUND 1 OF 11: ATTENDANCE & PUNCTUALITY",
        questions: [
          {
            id: "q1_a",
            question: "Monica is obsessed with being on time. What is Orion's policy regarding tardiness?",
            options: ["Notify supervisor as soon as possible if arriving late", "Hide under your desk until noon", "Blame Chandler", "Tardiness is strictly allowed on Tuesdays"],
            correctText: "Notify supervisor as soon as possible if arriving late"
          },
          {
            id: "q1_b",
            question: "If Joey oversleeps for his shift, what is the required protocol?",
            options: ["Notify supervisor immediately prior to shift start", "Send Joey's twin Carl to cover", "Blame daylight saving time", "Eat a sandwich and show up at 2 PM"],
            correctText: "Notify supervisor immediately prior to shift start"
          }
        ]
      },
      {
        roundNumber: 6,
        badge: "ROUND 6 OF 11: DRUG FREE WORKPLACE",
        questions: [
          {
            id: "q6_a",
            question: "Ross accidentally eats a 'special' brownie before coming to work. What is Orion's policy on controlled substances?",
            options: ["Strictly drug-free workplace; prohibited on premises or while performing duties", "Allowed during lunch hours", "Allowed if brought in a Tupperware container", "Only prohibited on Mondays"],
            correctText: "Strictly drug-free workplace; prohibited on premises or while performing duties"
          },
          {
            id: "q6_b",
            question: "Phoebe brings unauthorized controlled substances near company premises. Is this permitted?",
            options: ["Strictly prohibited on company premises or during work hours", "Permitted if shared with supervisors", "Permitted on Fridays after 3 PM", "Permitted in the coffee lounge"],
            correctText: "Strictly prohibited on company premises or during work hours"
          }
        ]
      }
    ];

    let activeGameQuestions = [];
    let currentQIndex = -1;
    let gameStarted = false;
    let timer = 30;
    let timerInterval = null;
    let musicDelayTimeout = null;

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function initializeGameQueue() {
      activeGameQuestions = topicPool.map(topic => {
        const rawQ = topic.questions[Math.floor(Math.random() * topic.questions.length)];
        const shuffledOpts = shuffleArray(rawQ.options);
        const newCorrectIndex = shuffledOpts.indexOf(rawQ.correctText);

        return {
          id: rawQ.id,
          roundNumber: topic.roundNumber,
          badge: topic.badge,
          question: rawQ.question,
          options: shuffledOpts,
          correct: newCorrectIndex
        };
      });
    }

    // DISPLAY FRIENDS INSTRUCTIONS SCREEN ON STARTUP
    function showWelcomeScreen() {
      gameStarted = false;
      currentQIndex = -1;
      clearInterval(timerInterval);
      clearTimeout(musicDelayTimeout);
      stopAllAudio();

      document.getElementById('timer-box').innerText = "30";
      document.getElementById('round-badge').innerText = "WELCOME TO CENTRAL PERK ☕";
      
      document.getElementById('question-text').innerHTML = `
        <div class="space-y-4 text-center">
          <p class="text-2xl sm:text-3xl font-black text-yellow-300">Could this BE any more exciting? ☕</p>
          <div class="bg-purple-950/80 p-5 rounded-2xl border-2 border-yellow-400/50 space-y-3 max-w-2xl mx-auto text-left text-sm sm:text-base font-medium shadow-inner">
            <p class="flex items-start gap-2">
              <span class="text-yellow-400 font-black">1.</span>
              <span>Gather your crew and form a team! (Pivot those chairs!)</span>
            </p>
            <p class="flex items-start gap-2">
              <span class="text-yellow-400 font-black">2.</span>
              <span>Pick <b>ONE device per team</b> and go to:</span>
            </p>
            <div class="text-center py-1">
              <a href="https://alicekeeler.github.io/friends-trivia/game/" target="_blank" class="text-yellow-300 font-mono font-bold text-base sm:text-lg bg-purple-900 px-4 py-2 rounded-xl border-2 border-yellow-400 hover:bg-yellow-400 hover:text-purple-950 transition-all inline-block shadow-lg">
                https://alicekeeler.github.io/friends-trivia/game/
              </a>
            </div>
            <p class="flex items-start gap-2">
              <span class="text-yellow-400 font-black">3.</span>
              <span>Type in your Team Name and get locked in.</span>
            </p>
          </div>
          <p class="text-xs sm:text-sm text-yellow-300 italic font-bold">
            👉 Host: Click "Next Question ➡️" above when all teams are ready to start Round 1!
          </p>
        </div>
      `;

      document.getElementById('options-grid').classList.add('hidden');
    }

    function loadQuestion(index, delayMusicMs = 1200) {
      if (activeGameQuestions.length === 0) initializeGameQueue();
      
      const q = activeGameQuestions[index];
      if (!q) return;

      document.getElementById('options-grid').classList.remove('hidden');
      document.getElementById('round-badge').innerText = q.badge;
      document.getElementById('question-text').innerText = q.question;

      for (let i = 0; i < 4; i++) {
        document.getElementById(`opt-${i}-text`).innerText = q.options[i];
        
        const card = document.getElementById(`option-card-${i}`);
        card.className = "option-card bg-purple-950 border-2 border-yellow-400/60 p-4 rounded-2xl flex items-center space-x-3 transition-all";
      }

      broadcastQuestionToPlayers(q);
      startTimer(delayMusicMs);
    }

    function startTimer(delayMusicMs = 1200) {
      clearInterval(timerInterval);
      clearTimeout(musicDelayTimeout);
      
      timer = 30;
      document.getElementById('timer-box').innerText = timer;
      document.getElementById('timer-box').className = "bg-purple-900 border-2 border-yellow-400 text-yellow-300 font-black text-2xl w-14 h-10 rounded-xl flex items-center justify-center shadow-inner";

      // DELAY THE THEME SONG SLIGHTLY SO BUTTON VOICE QUOTES PLAY CRISPLY
      musicDelayTimeout = setTimeout(() => {
        playAudio('timer-audio');
      }, delayMusicMs);

      timerInterval = setInterval(() => {
        timer--;
        document.getElementById('timer-box').innerText = timer;
        if (timer <= 5) {
          document.getElementById('timer-box').className = "bg-red-900 border-2 border-red-400 text-red-300 font-black text-2xl w-14 h-10 rounded-xl flex items-center justify-center shadow-inner animate-pulse";
        }
        if (timer <= 0) {
          clearInterval(timerInterval);
          stopAudio('timer-audio');
          playAudio('timer-stop-audio'); // enough-already.mp3
        }
      }, 1000);
    }

    function nextQuestion() {
      stopAllAudio();
      playAudio('next-q-audio'); // i-got-a-question.mp3

      if (!gameStarted) {
        gameStarted = true;
        currentQIndex = 0;
      } else {
        currentQIndex = (currentQIndex + 1) % activeGameQuestions.length;
      }

      loadQuestion(currentQIndex, 1200);
    }

    function restartRound() {
      if (!gameStarted) return;
      stopAllAudio();
      playAudio('restart-round-audio'); // how-come-you-re-working-here.mp3
      loadQuestion(currentQIndex, 1800);
    }

    function restartGame() {
      stopAllAudio();
      playAudio('restart-game-audio'); // don-t-be-so-negative.mp3

      if (confirm("Restart game back to the welcome screen? This will scramble question choices.")) {
        initializeGameQueue();
        showWelcomeScreen();
        fetch(`${SCRIPT_URL}?action=reset`).catch(() => {});
      }
    }

    function revealAnswer() {
      if (!gameStarted) return;
      stopAudio('timer-audio');
      clearTimeout(musicDelayTimeout);
      playAudio('reveal-audio'); // claps.mp3

      const q = activeGameQuestions[currentQIndex];
      if (!q) return;

      const correctIndex = q.correct;
      const correctCard = document.getElementById(`option-card-${correctIndex}`);

      correctCard.className = "option-card bg-green-900/90 border-4 border-green-400 p-4 rounded-2xl flex items-center space-x-3 transition-all ring-4 ring-green-400/50 scale-105";
    }

    async function openLeaderboard() {
      stopAudio('timer-audio');
      playAudio('leaderboard-audio'); // how-dumb-are-you.mp3

      document.getElementById('leaderboard-modal').classList.remove('hidden');
      const listContainer = document.getElementById('leaderboard-list');
      
      if (!gameStarted) {
        listContainer.innerHTML = `<p class="text-center text-yellow-300 py-4 font-bold">Game has not started yet!</p>`;
        return;
      }

      listContainer.innerHTML = `<p class="text-center text-purple-300 italic py-4">Fetching live scores...</p>`;
      const currentQ = activeGameQuestions[currentQIndex];

      try {
        const response = await fetch(`${SCRIPT_URL}?action=getVotes&round=${currentQ.roundNumber}`);
        const data = await response.json();

        if (data && data.votes) {
          const votes = data.votes;
          const teams = Object.keys(votes);

          if (teams.length === 0) {
            listContainer.innerHTML = `<p class="text-center text-yellow-300 py-4 font-bold">No answers submitted yet for Round ${currentQ.roundNumber}.</p>`;
            return;
          }

          let html = '';
          teams.forEach(team => {
            const chosenAnswer = votes[team];
            const isCorrect = chosenAnswer == currentQ.correct;
            
            html += `
              <div class="flex items-center justify-between bg-purple-900/80 p-3 rounded-xl border border-yellow-400/40">
                <span class="font-bold text-white text-sm">${team}</span>
                <span class="font-bold text-xs ${isCorrect ? 'text-green-400 bg-green-950 px-2.5 py-1 rounded-lg border border-green-500' : 'text-red-400 bg-red-950 px-2.5 py-1 rounded-lg border border-red-500'}">
                  ${isCorrect ? '100 PTS (Correct)' : '0 PTS'}
                </span>
              </div>
            `;
          });

          listContainer.innerHTML = html;
        }
      } catch (err) {
        listContainer.innerHTML = `<p class="text-center text-red-400 font-bold py-4">Unable to load scores.</p>`;
      }
    }

    function closeLeaderboard() {
      document.getElementById('leaderboard-modal').classList.add('hidden');
    }

    async function broadcastQuestionToPlayers(q) {
      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'setActiveQuestion',
            id: q.id,
            number: q.roundNumber,
            question: q.question,
            options: q.options
          })
        });
      } catch (err) {
        console.error("Broadcast failed:", err);
      }
    }

    // INITIALIZE QUEUE AND SHOW WELCOME SCREEN
    initializeGameQueue();
    showWelcomeScreen();
  </script>
</body>
</html>
