<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O·R·I·O·N - The One With the Employee Handbook</title>
  <style>
    :root {
      --bg-color: #1a0826;
      --card-bg: #2b113e;
      --border-gold: #ffd000;
      --text-white: #ffffff;
      --dot-red: #ff2a2a;
      --dot-blue: #00a2ff;
      --dot-yellow: #ffd000;
      --btn-red: #ff4d6d;
      --btn-yellow: #ffd000;
      --btn-green: #2ec4b6;
      --btn-blue: #3a86ef;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-white);
      margin: 0;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: space-between;
    }

    /* 🔴🔵🟡 FRIENDS LOGO HEADER */
    .friends-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .friends-title {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 6px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin: 0 4px;
    }
    .dot-red { background-color: var(--dot-red); box-shadow: 0 0 8px var(--dot-red); }
    .dot-blue { background-color: var(--dot-blue); box-shadow: 0 0 8px var(--dot-blue); }
    .dot-yellow { background-color: var(--dot-yellow); box-shadow: 0 0 8px var(--dot-yellow); }

    .subtitle {
      font-style: italic;
      color: var(--border-gold);
      font-size: 1.1rem;
      margin-top: 6px;
      font-weight: bold;
    }

    /* 🎛️ TOP CONTROL TOOLBAR */
    .control-toolbar {
      width: 100%;
      max-width: 1050px;
      border: 2px solid var(--border-gold);
      background-color: rgba(43, 17, 62, 0.7);
      border-radius: 40px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .btn {
      border: none;
      padding: 10px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s ease, filter 0.2s ease;
    }

    .btn:hover { filter: brightness(1.15); }
    .btn:active { transform: scale(0.95); }

    .btn-yellow { background-color: var(--btn-yellow); color: #000; }
    .btn-red { background-color: var(--btn-red); color: #fff; }
    .btn-green { background-color: var(--btn-green); color: #000; }
    .btn-blue { background-color: var(--btn-blue); color: #fff; }

    .timer-box {
      background: #14051e;
      border: 2px solid var(--border-gold);
      color: #fff;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 6px 18px;
      border-radius: 12px;
      min-width: 50px;
      text-align: center;
    }

    /* 🏷️ ROUND BADGE */
    .round-badge {
      background-color: var(--border-gold);
      color: #000;
      font-weight: 900;
      padding: 8px 24px;
      border-radius: 20px;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 25px;
      box-shadow: 0 0 15px rgba(255, 208, 0, 0.3);
    }

    /* ❓ MAIN QUESTION CARD */
    .question-card {
      width: 100%;
      max-width: 850px;
      border: 3px solid var(--border-gold);
      background-color: var(--card-bg);
      border-radius: 24px;
      padding: 35px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      margin-bottom: 40px;
    }

    .question-text {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 30px;
    }

    /* 🔲 2x2 OPTIONS GRID */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .option-btn {
      background: #1e0b2e;
      border: 2px solid #5a2e82;
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .option-badge {
      background-color: var(--border-gold);
      color: #000;
      font-weight: 900;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.1rem;
    }

    .option-btn.correct {
      background-color: rgba(46, 196, 182, 0.25);
      border-color: var(--btn-green);
      color: #2ec4b6;
      box-shadow: 0 0 15px rgba(46, 196, 182, 0.4);
    }

    /* 🦶 BOTTOM STATUS FOOTER */
    .footer-bar {
      width: 100%;
      max-width: 1050px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .footer-pill {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 8px 18px;
      border-radius: 20px;
      color: var(--border-gold);
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .options-grid { grid-template-columns: 1fr; }
      .control-toolbar { justify-content: center; }
      .friends-title { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <!-- 🔴🔵🟡 HEADER -->
  <div class="friends-header">
    <div class="friends-title">
      O<span class="dot dot-red"></span>R<span class="dot dot-blue"></span>I<span class="dot dot-yellow"></span>O<span class="dot dot-red"></span>N
    </div>
    <div class="subtitle">"The One With the Employee Handbook" ☕</div>
  </div>

  <!-- 🎛️ CONTROL TOOLBAR -->
  <div class="control-toolbar">
    <button class="btn btn-yellow" onclick="playAudio('theme')">🎷 FRIENDS THEME ► Play</button>
    <button class="btn btn-red" onclick="stopAudio()">⏹ Stop All</button>
    
    <div class="timer-box" id="timer-display">0</div>

    <button class="btn btn-red" onclick="restartGame()">⏮ Restart Game</button>
    <button class="btn btn-yellow" onclick="restartRound()">🔄 Restart Round</button>
    <button class="btn btn-green" onclick="revealAnswer()">💡 Reveal Answer</button>
    <button class="btn btn-blue" onclick="openLeaderboard()">🏆 Leaderboard</button>
    <button class="btn btn-yellow" onclick="nextQuestion()">Next Question ➡️</button>
  </div>

  <!-- 🏷️ ROUND INDICATOR -->
  <div class="round-badge" id="round-title">
    LOADING QUESTIONS...
  </div>

  <!-- ❓ QUESTION DISPLAY BOX -->
  <div class="question-card">
    <div class="question-text" id="question-text">
      Loading game dataset...
    </div>

    <div class="options-grid" id="options-container"></div>
  </div>

  <!-- 🦶 FOOTER BAR -->
  <div class="footer-bar">
    <div class="footer-pill" id="join-url">
      📲 Players Join: alicekeeler.github.io/friends-trivia/game/
    </div>
    <div class="footer-pill" id="audio-status">
      🔊 Audio: Ready
    </div>
  </div>

  <audio id="audio-player"></audio>

  <script>
    const LEADERBOARD_URL = "Leaderboard.html";
    const JSON_PATH = "questions.json";

    let gameQuestions = [];
    let rawCategoriesData = [];
    let currentIndex = 0;
    let timerInterval = null;
    let secondsElapsed = 0;

    // 📥 FETCH & INITIALIZE GAME
    async function initGame() {
      try {
        const response = await fetch(JSON_PATH);
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        
        rawCategoriesData = await response.json();
        buildRandomizedGame();
      } catch (err) {
        console.error("Error loading questions.json:", err);
        document.getElementById('question-text').innerText = 
          "Failed to load questions.json. Ensure file is saved in the same directory and served via a local web server (e.g. GitHub Pages or VS Code Live Server).";
      }
    }

    // 🎲 PICK ONE RANDOM QUESTION PER CATEGORY
    function buildRandomizedGame() {
      gameQuestions = rawCategoriesData.map((cat, idx) => {
        // Pick random question from array
        const randomQIndex = Math.floor(Math.random() * cat.questions.length);
        const selectedQ = cat.questions[randomQIndex];

        return {
          round: idx + 1,
          category: cat.category.toUpperCase(),
          q: selectedQ.q,
          // Strip "A) ", "B) " prefixes if present so option text stays clean
          options: selectedQ.options.map(opt => opt.replace(/^[A-D]\)\s*/i, '')),
          answer: selectedQ.answer
        };
      });

      currentIndex = 0;
      loadQuestion(0);
    }

    // 🚀 DISPLAY CURRENT QUESTION
    function loadQuestion(index) {
      if (!gameQuestions.length) return;

      const qData = gameQuestions[index];
      document.getElementById('round-title').innerText = `ROUND ${qData.round} OF ${gameQuestions.length}: ${qData.category}`;
      document.getElementById('question-text').innerText = qData.q;

      const letters = ['A', 'B', 'C', 'D'];
      const container = document.getElementById('options-container');
      
      container.innerHTML = qData.options.map((optText, i) => `
        <div class="option-btn" id="opt-${i}">
          <div class="option-badge">${letters[i]}</div>
          <div>${optText}</div>
        </div>
      `).join('');

      resetTimer();
      startTimer();
    }

    // 💡 REVEAL CORRECT ANSWER
    function revealAnswer() {
      if (!gameQuestions.length) return;
      const qData = gameQuestions[currentIndex];
      const correctBtn = document.getElementById(`opt-${qData.answer}`);
      if (correctBtn) {
        correctBtn.classList.add('correct');
      }
    }

    // ➡️ NEXT QUESTION
    function nextQuestion() {
      if (currentIndex < gameQuestions.length - 1) {
        currentIndex++;
        loadQuestion(currentIndex);
      } else {
        alert("You have reached the end of all rounds!");
      }
    }

    // 🔄 RESTART ROUND / GAME
    function restartRound() {
      loadQuestion(currentIndex);
    }

    function restartGame() {
      if (confirm("Restart game? This will pick a new set of random questions from questions.json!")) {
        buildRandomizedGame();
      }
    }

    // 🏆 LEADERBOARD
    function openLeaderboard() {
      window.open(LEADERBOARD_URL, '_blank');
    }

    // ⏱️ TIMER
    function startTimer() {
      clearInterval(timerInterval);
      secondsElapsed = 0;
      document.getElementById('timer-display').innerText = secondsElapsed;
      timerInterval = setInterval(() => {
        secondsElapsed++;
        document.getElementById('timer-display').innerText = secondsElapsed;
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      secondsElapsed = 0;
      document.getElementById('timer-display').innerText = "0";
    }

    // 🔊 AUDIO
    function playAudio(type) {
      document.getElementById('audio-status').innerText = "🔊 Playing: Friends Theme.mp3";
    }

    function stopAudio() {
      document.getElementById('audio-status').innerText = "🔇 Audio: Stopped";
    }

    // START ON LOAD
    window.onload = () => {
      initGame();
    };
  </script>
</body>
</html>
