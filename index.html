<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-door: #682c7a;
      --yellow-frame: #f8b319;
      --dot-red: #e74c3c;
      --dot-blue: #3498db;
      --dot-yellow: #f1c40f;
      --bg-dark: #120b18;
      --card-bg: #22142e;
      --text-light: #ffffff;
      --accent-green: #2ecc71;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-light);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .host-stage {
      width: 100%;
      max-width: 950px;
      background-color: var(--card-bg);
      border: 8px solid var(--yellow-frame);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 0 50px rgba(248, 179, 25, 0.3), inset 0 0 20px rgba(0,0,0,0.6);
    }

    .friends-header {
      text-align: center;
      font-weight: 900;
      font-size: 2.8rem;
      letter-spacing: 6px;
      margin-bottom: 2px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .dot-red { color: var(--dot-red); }
    .dot-blue { color: var(--dot-blue); }
    .dot-yellow { color: var(--dot-yellow); }

    .sub-header {
      text-align: center;
      color: var(--yellow-frame);
      font-size: 1.1rem;
      margin-top: 0;
      margin-bottom: 20px;
      font-style: italic;
      font-weight: 700;
    }

    .theme-bar {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(248, 179, 25, 0.3);
      border-radius: 12px;
      padding: 10px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .team-box {
      background: linear-gradient(145deg, #682c7a, #4a1f58);
      border: 3px solid var(--yellow-frame);
      border-radius: 14px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .team-name {
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 1px;
      color: #f3e5f8;
    }

    .team-score {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--yellow-frame);
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      margin: 5px 0;
    }

    .score-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-weight: bold;
      padding: 8px 14px;
      margin: 2px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .score-btn:hover { background: var(--yellow-frame); color: black; }

    .question-card {
      background: #170d21;
      border-left: 8px solid var(--yellow-frame);
      border-radius: 14px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    .topic-pill {
      display: inline-block;
      background: var(--purple-door);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 900;
      padding: 6px 14px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .q-title {
      color: var(--yellow-frame);
      margin: 15px 0 10px 0;
      font-size: 1.8rem;
      font-weight: 900;
    }

    .scenario-text {
      font-size: 1.35rem;
      line-height: 1.6;
      color: #f5f5f5;
      margin-bottom: 25px;
      font-weight: 400;
    }

    .options-grid {
      display: none;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .option-card {
      background: #2b173d;
      border: 2px solid #4a2868;
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #e2d3ee;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .option-badge {
      background: var(--yellow-frame);
      color: #000;
      font-weight: 900;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 1.1rem;
    }

    .option-card.correct {
      border-color: var(--accent-green);
      background: rgba(46, 204, 113, 0.2);
      color: #ffffff;
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
    }

    .answer-box {
      display: none;
      background: rgba(46, 204, 113, 0.15);
      border: 3px solid var(--accent-green);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .action-btn {
      flex: 1;
      min-width: 180px;
      background: var(--yellow-frame);
      color: #000;
      font-family: inherit;
      font-weight: 900;
      font-size: 1rem;
      padding: 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .action-btn.secondary { background: var(--purple-door); color: white; border: 1px solid var(--yellow-frame); }
    .action-btn.green { background: var(--accent-green); color: white; }

    .nav-deck {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      border-top: 2px solid rgba(255,255,255,0.1);
      padding-top: 20px;
    }
  </style>
</head>
<body>

<div class="host-stage">
  <div class="friends-header">
    T<span class="dot-red">•</span>R<span class="dot-blue">•</span>I<span class="dot-yellow">•</span>V<span class="dot-red">•</span>I<span class="dot-blue">•</span>A
  </div>
  <div class="sub-header">"The One With the Employee Handbook"</div>

  <!-- Theme Song Player -->
  <div class="theme-bar">
    <span style="font-weight: 900; color: var(--yellow-frame); font-size: 0.95rem;">🎵 CENTRAL PERK THEME SONG</span>
    <audio id="theme-audio-player" controls style="height: 32px; width: 300px;" preload="metadata">
      <source id="theme-source" src="theme.mp3" type="audio/mp3">
    </audio>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="team-box">
      <div class="team-name">TEAM MONICA</div>
      <div id="score-1" class="team-score">0</div>
      <button class="score-btn" onclick="addScore(1, 100)">+100</button>
      <button class="score-btn" onclick="addScore(1, 150)">+150</button>
      <button class="score-btn" onclick="addScore(1, -50)">-50</button>
    </div>
    <div class="team-box">
      <div class="team-name">TEAM CHANDLER</div>
      <div id="score-2" class="team-score">0</div>
      <button class="score-btn" onclick="addScore(2, 100)">+100</button>
      <button class="score-btn" onclick="addScore(2, 150)">+150</button>
      <button class="score-btn" onclick="addScore(2, -50)">-50</button>
    </div>
  </div>

  <!-- Question Card -->
  <div class="question-card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span id="topic-pill" class="topic-pill">TOPIC</span>
      <span id="q-number" style="font-size: 1rem; font-weight: bold; color: var(--yellow-frame);">Question 1 of 9</span>
    </div>
    
    <h2 id="q-title" class="q-title">Question Title</h2>
    <div id="scenario-text" class="scenario-text">Loading scenario...</div>

    <div class="btn-row">
      <button class="action-btn secondary" onclick="toggleOptions()">👁️ Show/Hide Options</button>
      <button class="action-btn green" onclick="revealAnswer()">✅ Reveal Correct Answer</button>
    </div>

    <div id="options-grid" class="options-grid"></div>

    <div id="answer-box" class="answer-box">
      <strong id="answer-title" style="color: var(--accent-green); font-size: 1.3rem;"></strong>
      <p id="answer-exp" style="margin: 10px 0 0 0; font-size: 1.1rem; line-height: 1.5; color: #fff;"></p>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-deck">
    <button class="action-btn secondary" style="min-width: 120px;" onclick="prevQuestion()">◄ Prev</button>
    <button class="action-btn" style="min-width: 120px;" onclick="nextQuestion()">Next ►</button>
  </div>
</div>

<script>
  // Direct Root Audio Paths (No subfolder)
  const SOUNDS = {
    THEME:          'theme.mp3',
    HOW_YOU_DOIN:   'howyoudoin.mp3',
    EXCELLENT:      'excellent.mp3',
    I_KNOW:         'iknow.mp3',
    CHECK:          'check.mp3',
    LOST_YOUR_MIND: 'lostmind.mp3',
    QUESTION:       'question.mp3'
  };

  let currentAudio = null;

  function playClip(url) {
    try {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      currentAudio = new Audio(url);
      currentAudio.play().catch(e => console.log("Audio play suppressed:", e));
    } catch(err) {
      console.log("Audio playback error:", err);
    }
  }

  const triviaData = [
    {
      id: "1.1", topic: "Clocking In/Out", title: "The One Where Chandler Clocks Joey In",
      scenario: "Joey is running late for his shift at ORION because of an emergency audition for Days of Our Lives. He calls Chandler and begs him to swipe his badge and clock him in on the electronic system before 8:00 AM.",
      options: {
        A: "Chandler can clock Joey in as long as Joey arrives within 15 minutes.",
        B: "Clocking in for another employee is considered falsification of records and subjects both employees to disciplinary action, up to termination.",
        C: "Chandler can clock Joey in only if he leaves a sticky note for supervisor Monica.",
        D: "Joey receives a verbal warning, but Chandler faces no consequences because he was being a good friend."
      },
      correctAnswer: "B",
      explanation: "Badge-swapping or 'buddy-punching' is strictly prohibited under ORION policy and counts as falsifying official payroll records for both employees involved."
    },
    {
      id: "1.2", topic: "Clocking In/Out", title: "The One With Phoebe's Quick Errand",
      scenario: "Phoebe needs to step out of the building during her work shift for 20 minutes to grab new guitar strings from her cab down the street. She decides not to clock out since she'll be back in less than half an hour.",
      options: {
        A: "Non-work-related departures off campus require the employee to clock out, regardless of duration.",
        B: "Off-site trips under 30 minutes are automatically covered as paid time if you play a song upon return.",
        C: "Phoebe only needs to leave a note on her desk to stay clocked in.",
        D: "Employees are allowed two off-site personal trips per week while remaining clocked in."
      },
      correctAnswer: "A",
      explanation: "Whenever an employee leaves the physical worksite for personal, non-work reasons, they must clock out for safety, liability, and payroll accuracy."
    },
    {
      id: "1.3", topic: "Clocking In/Out", title: "The One Where Ross Is Early",
      scenario: "Ross arrives at the office 45 minutes early to organize his dinosaur fossil exhibits. He clocks in immediately so he can start earning overtime, without getting prior approval from his supervisor.",
      options: {
        A: "Unapproved early clock-ins are automatically converted to double-time pay.",
        B: "Employees may clock in whenever they arrive as long as work is performed.",
        C: "Working unauthorized time outside scheduled hours without prior supervisory approval is prohibited and subject to policy enforcement.",
        D: "Ross can clock in early only if he leaves 45 minutes early the same day to balance his hours."
      },
      correctAnswer: "C",
      explanation: "Employees cannot work unauthorized pre-shift or post-shift hours without advance approval from their supervisor."
    },
    {
      id: "2.1", topic: "Dress Code (Policy GAM)", title: "The One With All the Clothes",
      scenario: "Joey shows up to the ORION office wearing all of Chandler's clothes at once ('Could I be wearing any more clothes?'), featuring a graphic tee with offensive jokes and a sheer, see-through sweater.",
      options: {
        A: "Clothing with offensive graphic language or sheer materials violates the ORION professional dress policy.",
        B: "Joey is fine as long as he does lunges away from external clients.",
        C: "The dress code policy only applies when executive leadership is in the building.",
        D: "Graphic tees are permitted every day as long as they are layered under three other shirts."
      },
      correctAnswer: "A",
      explanation: "Attire featuring vulgar/offensive graphics or inappropriate/revealing fabrics is explicitly prohibited under Policy GAM."
    },
    {
      id: "2.2", topic: "Dress Code (Policy GAM)", title: "The One With Rachel's Flip-Flops",
      scenario: "Rachel arrives at work wearing rubber beach flip-flops and athletic sweatpants on the day of a major board presentation.",
      options: {
        A: "Casual footwear and athletic wear are fully acceptable on presentation days.",
        B: "Beach flip-flops and athletic wear are classified as inappropriate workplace attire under Policy GAM.",
        C: "Rachel can wear flip-flops if she claims they are high-fashion Ralph Lauren samples.",
        D: "Dress codes only apply to hourly staff, not fashion consultants."
      },
      correctAnswer: "B",
      explanation: "Rubber beach flip-flops and athletic sweatpants do not meet professional workplace dress standards under Policy GAM."
    },
    {
      id: "2.3", topic: "Dress Code (Policy GAM)", title: "The One Where Joey Is Sent Home",
      scenario: "After Joey arrives wearing Chandler's entire wardrobe, supervisor Monica sends him home to change into acceptable work clothes. How is Joey's travel time away treated?",
      options: {
        A: "The time spent going home to change is fully paid administrative leave.",
        B: "The time away to change into appropriate attire is uncompensated non-work time (or requires using personal leave).",
        C: "ORION reimburses Joey's gas mileage for the trip home to change.",
        D: "Joey receives 2 hours of overtime for correcting his fashion mistake."
      },
      correctAnswer: "B",
      explanation: "Time spent leaving the worksite to correct a dress code violation is uncompensated, or must be charged to accrued personal leave/PTO."
    },
    {
      id: "3.1", topic: "Sexual Harassment (GAAC)", title: "The One With 'How You Doin'?'",
      scenario: "Joey repeatedly winks at a co-worker, asks them out, and hints that agreeing to go on a date with him could guarantee a favorable annual performance review. What policy does this violate?",
      options: {
        A: "This is standard workplace flirting and not regulated by policy.",
        B: "This constitutes quid pro quo sexual harassment and hostile environment harassment under Policy GAAC.",
        C: "It is only harassment if Chandler witnesses it in person.",
        D: "It is allowed as long as Joey says 'How you doin'?' in a friendly voice."
      },
      correctAnswer: "B",
      explanation: "Tying workplace benefits (like performance reviews) to romantic or sexual favors is textbook quid pro quo harassment under Policy GAAC."
    },
    {
      id: "3.2", topic: "Sexual Harassment (GAAC)", title: "The One Where Rachel Reports Mr. Zelner",
      scenario: "After Rachel experiences inappropriate workplace comments from a department head, she files a formal complaint. Within how many business days must the Title IX / Compliance Coordinator contact her to discuss supportive measures?",
      options: {
        A: "30 calendar days",
        B: "10 business days",
        C: "Promptly, typically within 2 to 3 business days",
        D: "At her next annual evaluation meeting"
      },
      correctAnswer: "C",
      explanation: "The Coordinator must reach out promptly (usually within 2–3 business days) to offer supportive measures and discuss formal options."
    },
    {
      id: "3.3", topic: "Sexual Harassment (GAAC)", title: "The One Where Monica Witnessed It",
      scenario: "Monica witnesses a manager making unwanted sexual comments toward Phoebe in the hallway. Phoebe tells Monica not to worry about it, but Monica feels uncomfortable. Can Monica file a report?",
      options: {
        A: "No, only the direct target of the behavior can file a complaint.",
        B: "Yes, any employee who witnesses or becomes aware of policy violations can and should report it.",
        C: "Monica can only report it if she gets notarized signatures from Ross and Joey.",
        D: "Monica must wait 30 days to see if Phoebe reports it first."
      },
      correctAnswer: "B",
      explanation: "Any employee who witnesses or suspects policy violations is empowered and encouraged to report it to HR or administration."
    }
  ];

  let currentIndex = 0;
  let scoreTeam1 = 0;
  let scoreTeam2 = 0;

  function loadQuestion() {
    const q = triviaData[currentIndex];
    document.getElementById('q-number').innerText = `Question ${currentIndex + 1} of ${triviaData.length}`;
    document.getElementById('topic-pill').innerText = q.topic;
    document.getElementById('q-title').innerText = q.title;
    document.getElementById('scenario-text').innerText = q.scenario;

    const optGrid = document.getElementById('options-grid');
    optGrid.style.display = 'none';
    optGrid.innerHTML = '';
    
    Object.keys(q.options).forEach(key => {
      const card = document.createElement('div');
      card.className = 'option-card';
      card.id = `opt-${key}`;
      card.innerHTML = `<span class="option-badge">${key}</span> <span>${q.options[key]}</span>`;
      optGrid.appendChild(card);
    });

    document.getElementById('answer-box').style.display = 'none';
  }

  function toggleOptions() {
    playClip(SOUNDS.HOW_YOU_DOIN);
    const optGrid = document.getElementById('options-grid');
    optGrid.style.display = (optGrid.style.display === 'none' || optGrid.style.display === '') ? 'grid' : 'none';
  }

  function revealAnswer() {
    const q = triviaData[currentIndex];
    playClip(SOUNDS.EXCELLENT);
    
    const correctCard = document.getElementById(`opt-${q.correctAnswer}`);
    if (correctCard) {
      correctCard.classList.add('correct');
    }

    document.getElementById('answer-title').innerText = `Correct Answer: Option ${q.correctAnswer}`;
    document.getElementById('answer-exp').innerText = `${q.explanation}`;
    document.getElementById('answer-box').style.display = 'block';
    document.getElementById('options-grid').style.display = 'grid';
  }

  function nextQuestion() {
    if (currentIndex < triviaData.length - 1) {
      playClip(SOUNDS.QUESTION);
      currentIndex++;
      loadQuestion();
    }
  }

  function prevQuestion() {
    if (currentIndex > 0) {
      playClip(SOUNDS.QUESTION);
      currentIndex--;
      loadQuestion();
    }
  }

  function addScore(team, pts) {
    if (pts > 0) {
      playClip(pts === 100 ? SOUNDS.I_KNOW : SOUNDS.CHECK);
    } else {
      playClip(SOUNDS.LOST_YOUR_MIND);
    }

    if (team === 1) {
      scoreTeam1 += pts;
      document.getElementById('score-1').innerText = scoreTeam1;
    } else {
      scoreTeam2 += pts;
      document.getElementById('score-2').innerText = scoreTeam2;
    }
  }

  window.onload = function() {
    loadQuestion();
  };
</script>

</body>
</html>
